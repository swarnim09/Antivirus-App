name: Build APK
on: [push]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      - name: Grant execute permission
        run: chmod +x AntivirusApp/gradlew
      - name: Build APK
        run: cd AntivirusApp && ./gradlew assembleDebug
      - uses: actions/upload-artifact@v3
        with:
          name: SecureShield-APK
          path: AntivirusApp/app/build/outputs/apk/debug/app-debug.apk
